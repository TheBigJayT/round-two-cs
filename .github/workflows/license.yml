on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4    
      - uses: joeig/go-licenses-action@v1
        with:
          # Optional: Specify disallowed license types
          disallowed-types: 'forbidden,unknown'
