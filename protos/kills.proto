syntax = "proto3";

option go_package = "github.com/TheBigJayT/round-two-cs/protos";

message KillData {
    string KillerName = 1;
    int32 KillerID = 2;
    float KillerX = 3;
    float KillerY = 4;
    float KillerZ = 5;

    string VictimName = 6;
    int32 VictimID = 7;
    float VictimX = 8;
    float VictimY = 9;
    float VictimZ = 10;

    string Weapon = 11;
    bool IsHeadshot = 12;
    int32 RoundNum = 13;
    string KillerTeam = 14;
    string KillerTeamID = 15;
}

message KillDataList {
    repeated KillData Kills = 1;
}
