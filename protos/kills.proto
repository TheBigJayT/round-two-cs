syntax = "proto3";

option go_package = "github.com/TheBigJayT/round-two-cs/protos";

message KillData {
    string KillerName = 1;
    int32 KillerID = 2;
    float KillerX = 3;
    float KillerY = 4;
    float KillerZ = 5;
    int32 KillerXPixel = 16;
    int32 KillerYPixel = 17;

    string VictimName = 6;
    int32 VictimID = 7;
    float VictimX = 8;
    float VictimY = 9;
    float VictimZ = 10;
    int32 VictimXPixel = 18;
    int32 VictimYPixel = 19;

    string Weapon = 11;
    bool IsHeadshot = 12;
    int32 RoundNum = 13;
    string KillerTeam = 14;
    string KillerTeamID = 15;

    string KillerSide = 20;
    string VictimSide = 21;

    string AssisterName = 22;
    int32 AssisterID = 23;
    bool isAssist = 24;
    string AssisterSide = 25;
}

message KillDataList {
    repeated KillData Kills = 1;
}
